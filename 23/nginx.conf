events {
    worker_connections 1024;
}

http {
    # upstream — группа backend-серверов
    # В Docker Compose имена сервисов работают как хосты —
    # Docker сам разрешает "backend1" в IP нужного контейнера
    upstream backend {
        server backend1:3000 max_fails=2 fail_timeout=30s;  # основной сервер 1
        server backend2:3000 max_fails=2 fail_timeout=30s;  # основной сервер 2
        server backend3:3000 backup;                         # резервный сервер
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}